project:
  name: retail_demand_forecast
  version: "1.0"

data:
  raw_path: data/raw/sales.csv
  interim_path: data/interim/validated.csv
  processed_path: data/processed/features.csv
  scaler_path: data/processed/scaler.pkl
  n_rows: 5000
  n_stores: 5
  n_products: 10
  date_start: "2022-01-01"
  test_split: 0.2

features:
  target: sales
  date_col: date
  lag_days: [1, 7, 14]
  rolling_windows: [7, 14]
  exog_cols: [promotion, is_holiday, price]

models:
  output_dir: models/
  metrics_path: models/metrics.json
  best_model_info: models/best_model_info.json

  ar:
    search:
      lags_range: [1, 2, 3, 5, 7, 14, 21]
      n_samples: 5

  arima:
    search:
      p_range: [0, 1, 2, 3]
      d_range: [0, 1]
      q_range: [0, 1, 2]
      n_samples: 10

  arimax:
    search:
      p_range: [0, 1, 2, 3]
      d_range: [0, 1]
      q_range: [0, 1, 2]
      n_samples: 10

  sarima:
    search:
      p_range: [0, 1, 2]
      d_range: [0, 1]
      q_range: [0, 1, 2]
      P_range: [0, 1]
      D_range: [0, 1]
      Q_range: [0, 1]
      s: 7
      n_samples: 8

  sarimax:
    search:
      p_range: [0, 1, 2]
      d_range: [0, 1]
      q_range: [0, 1, 2]
      P_range: [0, 1]
      D_range: [0, 1]
      Q_range: [0, 1]
      s: 7
      n_samples: 8

  prophet:
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: false
    changepoint_prior_scale: 0.05
    seasonality_prior_scale: 10.0

  xgboost:
    search:
      n_iter: 20
      cv: 3
      scoring: neg_mean_squared_error
      param_grid:
        n_estimators: [100, 200, 300, 500]
        max_depth: [3, 4, 5, 6]
        learning_rate: [0.01, 0.05, 0.1, 0.2]
        subsample: [0.6, 0.8, 1.0]
        colsample_bytree: [0.6, 0.8, 1.0]
        min_child_weight: [1, 3, 5]

inventory:
  safety_stock_factor: 1.5
  lead_time_days: 3
  stockout_threshold_days: 2
  overstock_multiplier: 3.0
